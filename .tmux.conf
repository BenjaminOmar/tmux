# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Set status bar refresh interval to 15 seconds
set -g status-interval 15

# Reload TMUX environment
bind-key r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Unbind default prefix key (Ctrl-b)
unbind C-b

# Set prefix keys
set -g prefix C-j
set -g prefix2 C-f

# Enable mouse support (clickable windows, panes, resizable panes)
set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Use Alt-arrow keys without prefix to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Use Alt-arrow keys without prefix to resize panes
bind -n M-S-Left resize-pane -L 5
bind -n M-S-Right resize-pane -R 5
bind -n M-S-Up resize-pane -U 5
bind -n M-S-Down resize-pane -D 5

# Shift arrow to switch windows
bind -n S-Left previous-window
bind -n S-Right next-window

# Reorder windows with CTRL-SHIFT-arrow
bind-key -n C-S-Left swap-window -t -1
bind-key -n C-S-Right swap-window -t +1

# Set easier window split keys
bind-key v split-window -h
bind-key h split-window -v

# Theming
set -g status-justify centre
set -g status-bg black
set -g status-fg colour35
set -g status-interval 60
set -g status-left-length 50
set -g window-status-format " #I:#W "
set -g window-status-style "bg=black,fg=colour35"
set -g window-status-current-format " #I:#W "
set -g window-status-current-style "bg=colour35,fg=colour234,bold"
set -g status-left "#[bg=colour35]#[fg=colour234,bold] #H #[fg=colour234] [#S] "
set -g status-right "#[bg=colour35]#[fg=colour234] #(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD 2>/dev/null) "

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"